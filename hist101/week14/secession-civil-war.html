let currentSection = 0;
let completedSections = new Set();

function updateProgress() {
  const pct = Math.round((currentSection / (SECTIONS.length - 1)) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('stepLabel').textContent = `Section ${currentSection + 1} of ${SECTIONS.length}`;
  const dots = document.getElementById('sectionDots').children;
  for (let i = 0; i < dots.length; i++) {
    dots[i].className = 'dot' + (i < currentSection ? ' done' : i === currentSection ? ' active' : '');
  }
}

function buildDots() {
  const wrap = document.getElementById('sectionDots');
  wrap.innerHTML = '';
  SECTIONS.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.title = s.title;
    wrap.appendChild(d);
  });
}

function renderSection(idx) {
  const s = SECTIONS[idx];
