<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hunt Builder – History Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1eb;
    --surface: #ffffff;
    --surface2: #f9f7f3;
    --border: #e0dbd0;
    --border2: #ccc8be;
    --accent: #2c3e50;
    --accent2: #e8523a;
    --gold: #c8932a;
    --green: #2a7d4f;
    --text: #1a1a1a;
    --muted: #7a7468;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
  }

  /* ── TOPBAR ── */
  header {
    background: var(--accent);
    padding: 0 32px;
    height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo {
    width: 34px; height: 34px;
    background: var(--gold);
    clip-path: polygon(0 0,100% 0,100% 75%,75% 100%,0 100%);
    display: grid; place-items: center;
    font-family: var(--font-display); font-size: 18px; color: #000;
  }
  header h1 { font-family: var(--font-display); font-size: 20px; color: #fff; letter-spacing: 1px; }
  .header-sub { font-size: 11px; color: rgba(255,255,255,0.45); letter-spacing: 2px; text-transform: uppercase; }

  /* ── LAYOUT ── */
  .layout { display: flex; min-height: calc(100vh - 56px); }

  /* ── SIDEBAR / HUNT LIST ── */
  .sidebar {
    width: 280px; flex-shrink: 0;
    background: var(--surface);
    border-right: 2px solid var(--border);
    display: flex; flex-direction: column;
  }
  .sidebar-top {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-top h2 { font-family: var(--font-display); font-size: 22px; letter-spacing: 0.5px; }
  .btn-new {
    background: var(--accent2); color: #fff;
    border: none; border-radius: 6px;
    font-family: var(--font-body); font-weight: 600; font-size: 13px;
    padding: 7px 14px; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; gap: 5px;
  }
  .btn-new:hover { background: #ff6b50; transform: translateY(-1px); }

  .hunt-list { flex: 1; overflow-y: auto; padding: 12px; }
  .hunt-list-item {
    padding: 14px 16px; border-radius: 8px;
    cursor: pointer; transition: all 0.15s;
    margin-bottom: 4px; border: 1.5px solid transparent;
    position: relative;
  }
  .hunt-list-item:hover { background: var(--surface2); }
  .hunt-list-item.active { background: #eef2f7; border-color: var(--accent); }
  .hunt-list-item h4 { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
  .hunt-list-item p { font-size: 12px; color: var(--muted); }
  .hunt-tag-pill {
    display: inline-block; font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    background: rgba(44,62,80,0.1); color: var(--accent);
    padding: 2px 7px; border-radius: 3px; margin-bottom: 5px;
    font-family: var(--font-mono);
  }
  .hunt-clue-count {
    position: absolute; top: 12px; right: 14px;
    font-family: var(--font-mono); font-size: 11px; color: var(--muted);
  }
  .hunt-delete-btn {
    position: absolute; bottom: 10px; right: 12px;
    background: none; border: none; color: var(--muted);
    font-size: 14px; cursor: pointer; opacity: 0;
    transition: opacity 0.15s;
  }
  .hunt-list-item:hover .hunt-delete-btn { opacity: 1; }
  .hunt-delete-btn:hover { color: var(--accent2); }

  .sidebar-empty {
    padding: 40px 20px; text-align: center; color: var(--muted);
    font-size: 13px; line-height: 1.7;
  }

  /* ── MAIN EDITOR ── */
  .editor {
    flex: 1; overflow-y: auto;
    padding: 32px 36px;
    max-width: 860px;
  }

  .editor-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; min-height: 400px; text-align: center; color: var(--muted);
  }
  .editor-empty .big-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.4; }
  .editor-empty h3 { font-family: var(--font-display); font-size: 32px; color: var(--text); opacity: 0.3; letter-spacing: 1px; }

  /* Section headers */
  .section {
    margin-bottom: 32px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }
  .section:last-child { border-bottom: none; }
  .section-title {
    font-family: var(--font-display); font-size: 22px;
    letter-spacing: 0.5px; margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title span { font-size: 18px; }

  /* Form fields */
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .field-row.three { grid-template-columns: 1fr 1fr 1fr; }
  .field-row.full { grid-template-columns: 1fr; }
  .field { margin-bottom: 0; }
  label.field-label {
    display: block; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px; font-weight: 500;
  }
  input[type="text"], input[type="number"], select, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 7px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(44,62,80,0.08);
  }
  textarea { resize: vertical; min-height: 72px; line-height: 1.6; }
  input[type="number"] { font-family: var(--font-mono); }

  /* ── CLUE CARDS ── */
  .clues-area { display: flex; flex-direction: column; gap: 16px; }
  .clue-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .clue-card:focus-within { border-color: var(--accent); }

  .clue-card-header {
    padding: 14px 18px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    cursor: grab;
    user-select: none;
  }
  .clue-card-header:active { cursor: grabbing; }
  .drag-handle { color: var(--muted); font-size: 16px; cursor: grab; }
  .clue-num-badge {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--accent); color: #fff;
    font-family: var(--font-mono); font-size: 12px;
    display: grid; place-items: center; flex-shrink: 0;
  }
  .clue-card-title-preview {
    flex: 1; font-size: 14px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .clue-pts-badge {
    font-family: var(--font-mono); font-size: 12px;
    background: rgba(200,147,42,0.15); color: var(--gold);
    padding: 3px 8px; border-radius: 4px; flex-shrink: 0;
  }
  .clue-toggle-btn, .clue-delete-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 16px; padding: 4px;
    transition: color 0.15s; flex-shrink: 0;
  }
  .clue-toggle-btn:hover { color: var(--text); }
  .clue-delete-btn:hover { color: var(--accent2); }

  .clue-card-body { padding: 18px; display: none; }
  .clue-card-body.open { display: block; }

  /* ── ADD CLUE ── */
  .add-clue-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 14px;
    background: transparent; border: 2px dashed var(--border2);
    color: var(--muted); font-family: var(--font-body); font-size: 14px;
    border-radius: 10px; cursor: pointer; transition: all 0.15s;
    margin-top: 8px;
  }
  .add-clue-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(44,62,80,0.03); }

  /* ── ACTION BUTTONS ── */
  .actions-row {
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    padding: 20px 36px;
    background: var(--surface);
    border-top: 2px solid var(--border);
    position: sticky; bottom: 0; z-index: 50;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: var(--font-body); font-weight: 600; font-size: 14px;
    padding: 10px 22px; border: none; border-radius: 7px;
    cursor: pointer; transition: all 0.15s; text-decoration: none;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #1a2634; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(44,62,80,0.25); }
  .btn-export { background: var(--green); color: #fff; }
  .btn-export:hover { background: #1f6040; box-shadow: 0 6px 20px rgba(42,125,79,0.25); }
  .btn-ghost { background: transparent; color: var(--text); border: 1.5px solid var(--border2); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: var(--accent2); color: #fff; }
  .btn-danger:hover { background: #ff6b50; }
  .btn[disabled] { opacity: 0.4; pointer-events: none; }

  /* ── OUTPUT MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(26,26,26,0.7);
    backdrop-filter: blur(6px);
    z-index: 200;
    display: none; place-items: center; padding: 24px;
  }
  .modal-overlay.open { display: grid; }
  .modal {
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 14px; width: 100%; max-width: 760px;
    max-height: 88vh; display: flex; flex-direction: column;
    animation: popIn 0.2s ease;
  }
  @keyframes popIn { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-header {
    padding: 20px 24px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-header h3 { font-family: var(--font-display); font-size: 26px; letter-spacing: 0.5px; }
  .modal-close {
    width: 32px; height: 32px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 50%;
    cursor: pointer; font-size: 16px; color: var(--muted);
    display: grid; place-items: center;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
  .modal-body p { font-size: 13px; color: var(--muted); margin-bottom: 12px; line-height: 1.6; }
  .modal-body ol { font-size: 13px; color: var(--muted); padding-left: 20px; line-height: 2; margin-bottom: 16px; }
  .modal-body ol li { margin-bottom: 4px; }
  .modal-body ol li code { background: #eef2f7; color: var(--accent); padding: 1px 6px; border-radius: 3px; font-family: var(--font-mono); font-size: 12px; }
  pre {
    background: #1a1f2e; color: #e8eaf0;
    font-family: var(--font-mono); font-size: 12px;
    padding: 20px; border-radius: 8px;
    overflow-x: auto; white-space: pre-wrap; word-break: break-all;
    max-height: 360px; overflow-y: auto;
    line-height: 1.6;
  }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex; gap: 10px;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--accent); color: #fff;
    font-size: 13px; font-weight: 600;
    padding: 12px 18px; border-radius: 8px;
    display: flex; align-items: center; gap: 8px;
    transform: translateY(80px); opacity: 0;
    transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 300; box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── PREVIEW BADGE ── */
  .preview-note {
    background: rgba(200,147,42,0.1); border: 1px solid rgba(200,147,42,0.3);
    border-radius: 6px; padding: 10px 14px; font-size: 12px; color: #8a6520;
    margin-bottom: 20px; display: flex; gap: 8px; align-items: flex-start;
  }

  /* ── DRAG STATES ── */
  .clue-card.drag-over { border-color: var(--accent); background: rgba(44,62,80,0.03); }
  .clue-card.dragging { opacity: 0.4; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">H</div>
    <div>
      <h1>HUNT BUILDER</h1>
      <div class="header-sub">Hauselmann's History Lab</div>
    </div>
  </div>
  <div style="display:flex;gap:10px">
    <button class="btn btn-ghost" style="font-size:12px;padding:6px 14px;color:rgba(255,255,255,0.7);border-color:rgba(255,255,255,0.2)" onclick="loadFromStorage()">↺ Restore saved</button>
    <button class="btn btn-ghost" style="font-size:12px;padding:6px 14px;color:rgba(255,255,255,0.7);border-color:rgba(255,255,255,0.2)" onclick="importJSON()">↑ Import JSON</button>
  </div>
</header>

<div class="layout">

  <!-- ══ SIDEBAR ══ -->
  <div class="sidebar">
    <div class="sidebar-top">
      <h2>MY HUNTS</h2>
      <button class="btn-new" onclick="newHunt()">+ New</button>
    </div>
    <div class="hunt-list" id="hunt-list">
      <div class="sidebar-empty">No hunts yet.<br>Click <strong>+ New</strong> to create your first.</div>
    </div>
  </div>

  <!-- ══ EDITOR ══ -->
  <div class="editor" id="editor">
    <div class="editor-empty">
      <div class="big-icon">🗺️</div>
      <h3>SELECT OR CREATE A HUNT</h3>
      <p style="font-size:14px;color:var(--muted);margin-top:12px;max-width:300px;line-height:1.7">Build photo scavenger hunts for your students. Each hunt can have unlimited clues with prompts, hints, and reflection questions.</p>
    </div>
  </div>

</div>

<!-- ══ STICKY ACTION BAR ══ -->
<div class="actions-row" id="actions-row" style="display:none">
  <button class="btn btn-primary" onclick="saveCurrentHunt()">💾 Save Hunt</button>
  <button class="btn btn-export" onclick="showExport()">⬇ Export for Website</button>
  <button class="btn btn-ghost" onclick="previewHunt()">👁 Preview JSON</button>
  <button class="btn btn-danger" style="margin-left:auto" onclick="deleteCurrentHunt()">🗑 Delete Hunt</button>
</div>

<!-- ══ OUTPUT MODAL ══ -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Export Hunt</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- ══ TOAST ══ -->
<div class="toast" id="toast"><span id="toast-msg">Saved!</span></div>

<!-- Hidden file input for import -->
<input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
let hunts = [];        // array of hunt objects
let activeHuntIdx = null;
let openClues = {};    // clueId -> bool (expanded)

// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  loadFromStorage(true);
});

// ════════════════════════════════════════
//  HUNT MANAGEMENT
// ════════════════════════════════════════
function newHunt() {
  const hunt = {
    id: 'hunt-' + Date.now(),
    title: 'New Hunt',
    tag: 'HIST 101',
    description: '',
    location: '',
    clueData: []
  };
  hunts.push(hunt);
  activeHuntIdx = hunts.length - 1;
  openClues = {};
  saveToStorage();
  renderSidebar();
  renderEditor();
}

function selectHunt(idx) {
  // Save current before switching
  if (activeHuntIdx !== null) collectFormData();
  activeHuntIdx = idx;
  openClues = {};
  renderSidebar();
  renderEditor();
}

function deleteCurrentHunt() {
  if (activeHuntIdx === null) return;
  const name = hunts[activeHuntIdx].title;
  if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
  hunts.splice(activeHuntIdx, 1);
  activeHuntIdx = hunts.length > 0 ? Math.min(activeHuntIdx, hunts.length-1) : null;
  openClues = {};
  saveToStorage();
  renderSidebar();
  renderEditor();
  toast('Hunt deleted');
}

// ════════════════════════════════════════
//  CLUE MANAGEMENT
// ════════════════════════════════════════
function addClue() {
  collectFormData();
  const hunt = hunts[activeHuntIdx];
  const newClue = {
    id: 'c' + (hunt.clueData.length + 1) + '_' + Date.now(),
    title: 'New Clue',
    prompt: '',
    hint: '',
    points: 10,
    reflection: ''
  };
  hunt.clueData.push(newClue);
  openClues[newClue.id] = true; // auto-open new clue
  renderEditor();
  // Scroll to bottom
  setTimeout(() => {
    const el = document.getElementById('clue-'+newClue.id);
    el?.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 50);
}

function deleteClue(clueId) {
  collectFormData();
  const hunt = hunts[activeHuntIdx];
  hunt.clueData = hunt.clueData.filter(c => c.id !== clueId);
  delete openClues[clueId];
  renderEditor();
}

function toggleClue(clueId) {
  openClues[clueId] = !openClues[clueId];
  // Re-render just the body toggle to avoid losing focus
  const body = document.getElementById('clue-body-'+clueId);
  const btn = document.getElementById('clue-toggle-'+clueId);
  if (body) body.classList.toggle('open', openClues[clueId]);
  if (btn) btn.textContent = openClues[clueId] ? '▲' : '▼';
}

// ════════════════════════════════════════
//  COLLECT FORM → STATE
// ════════════════════════════════════════
function collectFormData() {
  if (activeHuntIdx === null) return;
  const hunt = hunts[activeHuntIdx];

  // Hunt meta
  const get = id => document.getElementById(id)?.value?.trim() ?? '';
  hunt.title    = get('f-title') || hunt.title;
  hunt.tag      = get('f-tag')   || hunt.tag;
  hunt.description = get('f-desc');
  hunt.location = get('f-location');

  // Clues
  hunt.clueData.forEach(clue => {
    clue.title      = get('cf-title-'+clue.id)      || clue.title;
    clue.prompt     = get('cf-prompt-'+clue.id);
    clue.hint       = get('cf-hint-'+clue.id);
    clue.reflection = get('cf-reflection-'+clue.id);
    const pts = parseInt(document.getElementById('cf-points-'+clue.id)?.value);
    clue.points = isNaN(pts) ? clue.points : pts;
  });
}

// ════════════════════════════════════════
//  DRAG AND DROP REORDER
// ════════════════════════════════════════
let dragSrc = null;

function onDragStart(e, clueId) {
  collectFormData();
  dragSrc = clueId;
  document.getElementById('clue-'+clueId)?.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e, clueId) {
  e.preventDefault();
  if (dragSrc === clueId) return;
  document.querySelectorAll('.clue-card').forEach(c => c.classList.remove('drag-over'));
  document.getElementById('clue-'+clueId)?.classList.add('drag-over');
}
function onDrop(e, clueId) {
  e.preventDefault();
  if (!dragSrc || dragSrc === clueId) return;
  const hunt = hunts[activeHuntIdx];
  const srcIdx = hunt.clueData.findIndex(c => c.id === dragSrc);
  const dstIdx = hunt.clueData.findIndex(c => c.id === clueId);
  if (srcIdx < 0 || dstIdx < 0) return;
  const [moved] = hunt.clueData.splice(srcIdx, 1);
  hunt.clueData.splice(dstIdx, 0, moved);
  dragSrc = null;
  renderEditor();
}
function onDragEnd() {
  dragSrc = null;
  document.querySelectorAll('.clue-card').forEach(c => {
    c.classList.remove('dragging', 'drag-over');
  });
}

// ════════════════════════════════════════
//  RENDER SIDEBAR
// ════════════════════════════════════════
function renderSidebar() {
  const list = document.getElementById('hunt-list');
  if (!hunts.length) {
    list.innerHTML = '<div class="sidebar-empty">No hunts yet.<br>Click <strong>+ New</strong> to create your first.</div>';
    return;
  }
  list.innerHTML = hunts.map((h, i) => `
    <div class="hunt-list-item ${i === activeHuntIdx ? 'active' : ''}" onclick="selectHunt(${i})">
      <div class="hunt-tag-pill">${h.tag || '—'}</div>
      <h4>${h.title || 'Untitled Hunt'}</h4>
      <p>${h.location || 'No location set'}</p>
      <span class="hunt-clue-count">${h.clueData.length} clue${h.clueData.length !== 1 ? 's' : ''}</span>
      <button class="hunt-delete-btn" onclick="event.stopPropagation();quickDeleteHunt(${i})" title="Delete">🗑</button>
    </div>
  `).join('');
}

function quickDeleteHunt(idx) {
  if (!confirm(`Delete "${hunts[idx].title}"?`)) return;
  hunts.splice(idx, 1);
  if (activeHuntIdx === idx) { activeHuntIdx = null; openClues = {}; }
  else if (activeHuntIdx > idx) activeHuntIdx--;
  saveToStorage();
  renderSidebar();
  if (activeHuntIdx === null) renderEditor();
}

// ════════════════════════════════════════
//  RENDER EDITOR
// ════════════════════════════════════════
function renderEditor() {
  const editor = document.getElementById('editor');
  const actionsRow = document.getElementById('actions-row');

  if (activeHuntIdx === null) {
    editor.innerHTML = `
      <div class="editor-empty">
        <div class="big-icon">🗺️</div>
        <h3>SELECT OR CREATE A HUNT</h3>
        <p style="font-size:14px;color:var(--muted);margin-top:12px;max-width:300px;line-height:1.7">Build photo scavenger hunts for your students. Each hunt can have unlimited clues with prompts, hints, and reflection questions.</p>
      </div>`;
    actionsRow.style.display = 'none';
    return;
  }

  actionsRow.style.display = 'flex';
  const hunt = hunts[activeHuntIdx];

  editor.innerHTML = `
    <!-- HUNT META -->
    <div class="section">
      <div class="section-title"><span>📋</span> Hunt Details</div>
      <div class="field-row">
        <div class="field">
          <label class="field-label">Hunt Title *</label>
          <input type="text" id="f-title" value="${esc(hunt.title)}" placeholder="e.g. Campus History Walk" oninput="syncTitle(this.value)">
        </div>
        <div class="field">
          <label class="field-label">Course Tag</label>
          <input type="text" id="f-tag" value="${esc(hunt.tag)}" placeholder="e.g. HIST 101">
        </div>
      </div>
      <div class="field-row full">
        <div class="field">
          <label class="field-label">Description (shown to students)</label>
          <textarea id="f-desc" rows="2" placeholder="Brief description of what students will explore…">${esc(hunt.description)}</textarea>
        </div>
      </div>
      <div class="field-row full">
        <div class="field">
          <label class="field-label">Location / Setting</label>
          <input type="text" id="f-location" value="${esc(hunt.location)}" placeholder="e.g. MJC Campus, Downtown Modesto, Your Neighborhood">
        </div>
      </div>
    </div>

    <!-- CLUES -->
    <div class="section">
      <div class="section-title"><span>🔍</span> Clues <span style="font-size:14px;font-family:var(--font-mono);color:var(--muted);font-weight:400;margin-left:8px">${hunt.clueData.length} total</span></div>
      ${hunt.clueData.length === 0 ? `
        <div style="text-align:center;padding:32px;color:var(--muted);font-size:14px;background:var(--surface2);border-radius:8px;border:1.5px dashed var(--border2)">
          No clues yet. Add your first clue below.
        </div>
      ` : ''}
      <div class="clues-area" id="clues-area">
        ${hunt.clueData.map((clue, i) => renderClueCard(clue, i)).join('')}
      </div>
      <button class="add-clue-btn" onclick="addClue()">
        <span style="font-size:18px">＋</span> Add Clue
      </button>
    </div>
  `;
}

function renderClueCard(clue, i) {
  const isOpen = openClues[clue.id] || false;
  return `
    <div class="clue-card" id="clue-${clue.id}"
      draggable="true"
      ondragstart="onDragStart(event,'${clue.id}')"
      ondragover="onDragOver(event,'${clue.id}')"
      ondrop="onDrop(event,'${clue.id}')"
      ondragend="onDragEnd()">
      <div class="clue-card-header" onclick="toggleClue('${clue.id}')">
        <span class="drag-handle" title="Drag to reorder">⠿</span>
        <div class="clue-num-badge">${i+1}</div>
        <div class="clue-card-title-preview">${esc(clue.title) || 'Untitled Clue'}</div>
        <span class="clue-pts-badge">${clue.points} pts</span>
        <button class="clue-toggle-btn" id="clue-toggle-${clue.id}" onclick="event.stopPropagation();toggleClue('${clue.id}')">${isOpen ? '▲' : '▼'}</button>
        <button class="clue-delete-btn" onclick="event.stopPropagation();deleteClue('${clue.id}')" title="Delete clue">🗑</button>
      </div>
      <div class="clue-card-body ${isOpen ? 'open' : ''}" id="clue-body-${clue.id}">
        <div class="field-row">
          <div class="field">
            <label class="field-label">Clue Title *</label>
            <input type="text" id="cf-title-${clue.id}" value="${esc(clue.title)}" placeholder="e.g. The Founding Stone">
          </div>
          <div class="field">
            <label class="field-label">Points Value</label>
            <input type="number" id="cf-points-${clue.id}" value="${clue.points}" min="1" max="999" style="max-width:120px">
          </div>
        </div>
        <div class="field-row full">
          <div class="field">
            <label class="field-label">Photo Prompt * — What should students photograph?</label>
            <textarea id="cf-prompt-${clue.id}" rows="3" placeholder="Be specific: what object, sign, building, or scene should they find and photograph?">${esc(clue.prompt)}</textarea>
          </div>
        </div>
        <div class="field-row full">
          <div class="field">
            <label class="field-label">Hint (optional) — shown as a tip if students are stuck</label>
            <input type="text" id="cf-hint-${clue.id}" value="${esc(clue.hint)}" placeholder="e.g. Look near the administration building entrance">
          </div>
        </div>
        <div class="field-row full">
          <div class="field">
            <label class="field-label">Reflection Question * — students must answer this in writing</label>
            <textarea id="cf-reflection-${clue.id}" rows="2" placeholder="e.g. What does this founding date tell us about access to higher education in California?">${esc(clue.reflection)}</textarea>
          </div>
        </div>
      </div>
    </div>
  `;
}

function syncTitle(val) {
  if (activeHuntIdx === null) return;
  hunts[activeHuntIdx].title = val;
  // Update sidebar label live
  const item = document.querySelector(`.hunt-list-item:nth-child(${activeHuntIdx+1}) h4`);
  if (item) item.textContent = val || 'Untitled Hunt';
}

// ════════════════════════════════════════
//  SAVE / LOAD (localStorage)
// ════════════════════════════════════════
function saveCurrentHunt() {
  collectFormData();
  saveToStorage();
  renderSidebar();
  toast('Hunt saved ✓');
}

function saveToStorage() {
  try {
    localStorage.setItem('hunt_builder_data', JSON.stringify({ hunts, activeHuntIdx }));
  } catch(e) {}
}

function loadFromStorage(silent = false) {
  try {
    const raw = localStorage.getItem('hunt_builder_data');
    if (!raw) return;
    const data = JSON.parse(raw);
    hunts = data.hunts || [];
    activeHuntIdx = data.activeHuntIdx ?? null;
    openClues = {};
    renderSidebar();
    renderEditor();
    if (!silent) toast('Restored from last session');
  } catch(e) {
    if (!silent) toast('Nothing to restore');
  }
}

// ════════════════════════════════════════
//  EXPORT
// ════════════════════════════════════════
function showExport() {
  collectFormData();
  if (!hunts.length) { toast('No hunts to export'); return; }

  const exportData = hunts.map(h => ({
    id: h.id,
    title: h.title,
    tag: h.tag,
    description: h.description,
    location: h.location,
    clues: h.clueData.length,
    clueData: h.clueData.map(c => ({
      id: c.id,
      title: c.title,
      prompt: c.prompt,
      hint: c.hint,
      points: c.points,
      reflection: c.reflection
    }))
  }));

  const jsCode = `const HUNTS = ${JSON.stringify(exportData, null, 2)};`;

  document.getElementById('modal-title').textContent = 'Export to scavenger-hunt.html';
  document.getElementById('modal-body').innerHTML = `
    <div class="preview-note">
      ⚡ <span>This replaces the <code style="font-family:var(--font-mono);font-size:11px">const HUNTS = [...]</code> array in your <strong>scavenger-hunt.html</strong> file.</span>
    </div>
    <p>Follow these steps to publish your hunts:</p>
    <ol>
      <li>Click <strong>Copy Code</strong> below</li>
      <li>Open <code>scavenger-hunt.html</code> in a text editor</li>
      <li>Find the line that starts with <code>const HUNTS = [</code></li>
      <li>Select from that line through the closing <code>];</code> and paste to replace</li>
      <li>Save and upload to your website</li>
    </ol>
    <pre id="export-code">${escHtml(jsCode)}</pre>
  `;
  document.getElementById('modal-footer').innerHTML = `
    <button class="btn btn-primary" onclick="copyExport()">📋 Copy Code</button>
    <button class="btn btn-export" onclick="downloadJSON()">⬇ Download JSON backup</button>
    <button class="btn btn-ghost" onclick="closeModal()">Close</button>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

function copyExport() {
  collectFormData();
  const exportData = hunts.map(h => ({
    id: h.id, title: h.title, tag: h.tag,
    description: h.description, location: h.location, clues: h.clueData.length,
    clueData: h.clueData.map(c => ({
      id: c.id, title: c.title, prompt: c.prompt,
      hint: c.hint, points: c.points, reflection: c.reflection
    }))
  }));
  const code = `const HUNTS = ${JSON.stringify(exportData, null, 2)};`;
  navigator.clipboard.writeText(code).then(() => toast('Code copied to clipboard!')).catch(() => toast('Select and copy manually'));
}

function previewHunt() {
  collectFormData();
  if (activeHuntIdx === null) return;
  const h = hunts[activeHuntIdx];
  document.getElementById('modal-title').textContent = 'Preview: ' + h.title;
  document.getElementById('modal-body').innerHTML = `
    <p>This is how your hunt data looks as JSON. Use <strong>Export for Website</strong> to get the full ready-to-paste code.</p>
    <pre>${escHtml(JSON.stringify(h, null, 2))}</pre>
  `;
  document.getElementById('modal-footer').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal()">Close</button>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

function downloadJSON() {
  collectFormData();
  const blob = new Blob([JSON.stringify(hunts, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'hunt-builder-backup.json';
  a.click();
  toast('JSON downloaded');
}

function importJSON() {
  document.getElementById('import-file').click();
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const data = JSON.parse(evt.target.result);
      if (Array.isArray(data)) {
        collectFormData();
        hunts = [...hunts, ...data];
        saveToStorage();
        renderSidebar();
        toast(`Imported ${data.length} hunt(s)`);
      } else {
        alert('Invalid file format. Expected a JSON array of hunts.');
      }
    } catch { alert('Could not parse JSON file.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ════════════════════════════════════════
//  MODAL / TOAST
// ════════════════════════════════════════
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function toast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════
function esc(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Auto-save on input changes (debounced)
let autoSaveTimer = null;
document.addEventListener('input', () => {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    collectFormData();
    saveToStorage();
  }, 1200);
});
</script>
</body>
</html>
